<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Instagram</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="app-body">

  <!-- TOP NAV -->
  <header class="top-nav">
    <h1 class="logo nav-logo">Instagram</h1>
    <div class="nav-icons">
      <button class="icon-btn" title="New Post" onclick="window.location.href='upload.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      </button>
      <button class="icon-btn" title="Messages">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </button>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="main-content">

    <!-- STORIES BAR -->
    <section class="stories-bar">
      <div class="story-item your-story">
        <div class="story-avatar-wrap">
          <div class="story-avatar add-story-avatar" id="yourStoryAvatar">
            <span id="yourAvatarLetter">+</span>
          </div>
          <div class="add-icon">+</div>
        </div>
        <span class="story-name">Your Story</span>
      </div>
      <!-- Placeholder stories -->
      <div class="story-item">
        <div class="story-avatar-wrap story-ring">
          <div class="story-avatar" style="background: linear-gradient(135deg,#f472b6,#a855f7)"><span>A</span></div>
        </div>
        <span class="story-name">alex</span>
      </div>
      <div class="story-item">
        <div class="story-avatar-wrap story-ring">
          <div class="story-avatar" style="background: linear-gradient(135deg,#fb923c,#f43f5e)"><span>J</span></div>
        </div>
        <span class="story-name">jade</span>
      </div>
      <div class="story-item">
        <div class="story-avatar-wrap story-ring">
          <div class="story-avatar" style="background: linear-gradient(135deg,#34d399,#059669)"><span>K</span></div>
        </div>
        <span class="story-name">kai</span>
      </div>
      <div class="story-item">
        <div class="story-avatar-wrap story-ring">
          <div class="story-avatar" style="background: linear-gradient(135deg,#60a5fa,#6366f1)"><span>M</span></div>
        </div>
        <span class="story-name">mia</span>
      </div>
      <div class="story-item">
        <div class="story-avatar-wrap story-ring">
          <div class="story-avatar" style="background: linear-gradient(135deg,#fbbf24,#f97316)"><span>R</span></div>
        </div>
        <span class="story-name">riku</span>
      </div>
    </section>

    <hr class="divider-line"/>

    <!-- FEED -->
    <section class="feed" id="feed">

      <!-- Skeleton loaders while feed loads -->
      <div class="post-card skeleton-card">
        <div class="post-header">
          <div class="skeleton sk-avatar"></div>
          <div class="skeleton-lines">
            <div class="skeleton sk-line short"></div>
            <div class="skeleton sk-line xshort"></div>
          </div>
        </div>
        <div class="skeleton sk-image"></div>
        <div class="post-actions-wrap">
          <div class="skeleton sk-line medium" style="margin:12px 16px"></div>
        </div>
      </div>

      <div class="post-card skeleton-card">
        <div class="post-header">
          <div class="skeleton sk-avatar"></div>
          <div class="skeleton-lines">
            <div class="skeleton sk-line short"></div>
            <div class="skeleton sk-line xshort"></div>
          </div>
        </div>
        <div class="skeleton sk-image"></div>
        <div class="post-actions-wrap">
          <div class="skeleton sk-line medium" style="margin:12px 16px"></div>
        </div>
      </div>

    </section>

    <!-- Empty state (shown when no posts) -->
    <div class="empty-feed hidden" id="emptyFeed">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
      <h3>Share Photos</h3>
      <p>When you share photos, they'll appear on your profile.</p>
      <a href="upload.html" class="btn-primary small">Share your first photo</a>
    </div>

  </main>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <a href="home.html" class="nav-item active">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    </a>
    <a href="search.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </a>
    <a href="upload.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    </a>
    <a href="reels.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2"/><path d="M10 8l6 4-6 4V8z"/></svg>
    </a>
    <a href="profile.html" class="nav-item" id="profileNavLink">
      <div class="nav-avatar" id="navAvatar">U</div>
    </a>
  </nav>

  <script src="auth.js"></script>
  <script>
    // Guard: redirect to login if not authenticated
    supabaseClient.auth.getSession().then(({ data: { session } }) => {
      if (!session) {
        window.location.href = 'index.html';
        return;
      }
      const user = session.user;
      const letter = (user.user_metadata?.username || user.email || 'U')[0].toUpperCase();
      document.getElementById('navAvatar').textContent = letter;
      document.getElementById('yourAvatarLetter').textContent = letter;
      loadFeed(user);
    });

    async function loadFeed(user) {
      // Remove skeletons
      document.querySelectorAll('.skeleton-card').forEach(el => el.remove());

      const { data: posts, error } = await supabaseClient
        .from('posts')
        .select(`*, profiles(username, avatar_url)`)
        .order('created_at', { ascending: false })
        .limit(10);

      if (error || !posts || posts.length === 0) {
        document.getElementById('emptyFeed').classList.remove('hidden');
        return;
      }

      const feed = document.getElementById('feed');
      posts.forEach(post => {
        feed.innerHTML += buildPostCard(post, user.id);
      });
    }

    function buildPostCard(post, currentUserId) {
      const username = post.profiles?.username || 'user';
      const letter = username[0].toUpperCase();
      const timeAgo = getTimeAgo(post.created_at);
      return `
        <article class="post-card" id="post-${post.id}" data-liked="false" data-likes="${post.likes_count || 0}">
          <div class="post-header">
            <div class="post-avatar">${letter}</div>
            <div class="post-meta">
              <span class="post-username">${username}</span>
              <span class="post-location">${post.location || ''}</span>
            </div>
            <button class="icon-btn more-btn">•••</button>
          </div>
          <div class="post-img-wrap" ondblclick="likePost('${post.id}', true)" onclick="handleImgClick(event, '${post.id}')">
            <img class="post-image" src="${post.image_url}" alt="post" loading="lazy"/>
            <div class="heart-burst-wrap" id="burst-${post.id}"></div>
          </div>
          <div class="post-actions-wrap">
            <div class="post-actions">
              <button class="action-btn like-btn" id="like-${post.id}" onclick="likePost('${post.id}', false)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
              </button>
              <button class="action-btn" onclick="window.location.href='post.html?id=${post.id}'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              </button>
              <button class="action-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              </button>
            </div>
            <button class="action-btn bookmark-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
            </button>
          </div>
          <div class="post-likes" id="likes-${post.id}"><strong>${post.likes_count || 0} likes</strong></div>
          <div class="post-caption"><strong>${username}</strong> ${post.caption || ''}</div>
          <button class="view-comments-btn" onclick="window.location.href='post.html?id=${post.id}'">View all comments</button>
          <div class="post-time">${timeAgo}</div>
        </article>
      `;
    }

    // Double tap detection for feed image
    let lastTap = {};
    function handleImgClick(e, postId) {
      const now = Date.now();
      if (lastTap[postId] && now - lastTap[postId] < 350) {
        likePost(postId, true);
      }
      lastTap[postId] = now;
    }

    async function likePost(postId, fromDoubleTap) {
      const card = document.getElementById('post-' + postId);
      const isLiked = card.dataset.liked === 'true';
      let count = parseInt(card.dataset.likes) || 0;

      // If double tap and already liked, don't unlike
      if (fromDoubleTap && isLiked) {
        showBurst(postId); return;
      }

      const newLiked = !isLiked;
      const newCount = newLiked ? count + 1 : Math.max(0, count - 1);

      // Optimistic UI
      card.dataset.liked = newLiked;
      card.dataset.likes = newCount;
      document.getElementById('likes-' + postId).innerHTML = `<strong>${newCount} likes</strong>`;
      const btn = document.getElementById('like-' + postId);
      btn.innerHTML = newLiked
        ? `<svg viewBox="0 0 24 24" fill="#ef4444" stroke="#ef4444" stroke-width="1.8"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`
        : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;

      if (newLiked && fromDoubleTap) showBurst(postId);

      // DB
      if (newLiked) {
        await supabaseClient.from('likes').insert({ post_id: postId, user_id: currentUser.id });
      } else {
        await supabaseClient.from('likes').delete().eq('post_id', postId).eq('user_id', currentUser.id);
      }
      await supabaseClient.from('posts').update({ likes_count: newCount }).eq('id', postId);
    }

    function showBurst(postId) {
      const wrap = document.getElementById('burst-' + postId);
      wrap.innerHTML = '<span class="heart-burst">❤️</span>';
      setTimeout(() => { wrap.innerHTML = ''; }, 900);
    }

    function getTimeAgo(dateStr) {
      const diff = Date.now() - new Date(dateStr);
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return `${mins} minutes ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs} hours ago`;
      return `${Math.floor(hrs / 24)} days ago`;
    }
  </script>
</body>
</html>
