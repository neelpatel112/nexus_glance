<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Search — Instagram</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="app-body">

  <!-- TOP NAV -->
  <header class="top-nav search-nav">
    <div class="search-bar-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input
        type="text"
        id="searchInput"
        class="search-bar-input"
        placeholder="Search users…"
        autocomplete="off"
        oninput="handleSearch(this.value)"
      />
      <button class="clear-btn hidden" id="clearBtn" onclick="clearSearch()">✕</button>
    </div>
  </header>

  <main class="main-content search-main">

    <!-- Default: Explore grid -->
    <div id="exploreView">
      <div class="explore-grid" id="exploreGrid">
        <!-- Loads all posts as explore grid -->
      </div>
      <div class="skeleton-explore hidden" id="skeletonExplore">
        <div class="skeleton sk-grid-item"></div>
        <div class="skeleton sk-grid-item"></div>
        <div class="skeleton sk-grid-item"></div>
        <div class="skeleton sk-grid-item"></div>
        <div class="skeleton sk-grid-item"></div>
        <div class="skeleton sk-grid-item"></div>
      </div>
    </div>

    <!-- Search results -->
    <div id="searchView" class="hidden">

      <!-- Loading -->
      <div id="searchLoading" class="search-loading hidden">
        <div class="spinner"></div>
      </div>

      <!-- User results -->
      <div id="userResults"></div>

      <!-- No results -->
      <div id="noResults" class="no-results hidden">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <p>No results for</p>
        <span id="noResultsQuery"></span>
      </div>

    </div>

  </main>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <a href="home.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    </a>
    <a href="search.html" class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </a>
    <a href="upload.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    </a>
    <a href="reels.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2"/><path d="M10 8l6 4-6 4V8z"/></svg>
    </a>
    <a href="profile.html" class="nav-item">
      <div class="nav-avatar" id="navAvatar">U</div>
    </a>
  </nav>

  <script src="auth.js"></script>
  <script>
    let currentUser = null;
    let searchTimeout = null;

    supabaseClient.auth.getSession().then(({ data: { session } }) => {
      if (!session) { window.location.href = 'index.html'; return; }
      currentUser = session.user;
      const letter = (currentUser.user_metadata?.username || currentUser.email || 'U')[0].toUpperCase();
      document.getElementById('navAvatar').textContent = letter;
      loadExplore();
    });

    // ── EXPLORE GRID ──────────────────────────────────────────────
    async function loadExplore() {
      document.getElementById('skeletonExplore').classList.remove('hidden');
      const { data: posts } = await supabaseClient
        .from('posts')
        .select('id, image_url, likes_count')
        .order('created_at', { ascending: false })
        .limit(30);

      document.getElementById('skeletonExplore').classList.add('hidden');
      const grid = document.getElementById('exploreGrid');

      if (!posts || posts.length === 0) {
        grid.innerHTML = `<p class="explore-empty">No posts yet.</p>`;
        return;
      }

      // Mosaic layout — every 5th item is big
      posts.forEach((post, i) => {
        const isBig = i % 5 === 2;
        grid.innerHTML += `
          <div class="explore-item ${isBig ? 'explore-big' : ''}" onclick="window.location.href='post.html?id=${post.id}'">
            <img src="${post.image_url}" alt="post" loading="lazy"/>
            <div class="explore-overlay">
              <span>❤️ ${post.likes_count || 0}</span>
            </div>
          </div>
        `;
      });
    }

    // ── SEARCH ────────────────────────────────────────────────────
    function handleSearch(val) {
      const query = val.trim();
      document.getElementById('clearBtn').classList.toggle('hidden', !query);

      if (!query) {
        showExplore();
        return;
      }

      showSearchView();
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => searchUsers(query), 350); // debounce
    }

    function showExplore() {
      document.getElementById('exploreView').classList.remove('hidden');
      document.getElementById('searchView').classList.add('hidden');
    }

    function showSearchView() {
      document.getElementById('exploreView').classList.add('hidden');
      document.getElementById('searchView').classList.remove('hidden');
    }

    function clearSearch() {
      document.getElementById('searchInput').value = '';
      document.getElementById('clearBtn').classList.add('hidden');
      document.getElementById('userResults').innerHTML = '';
      document.getElementById('noResults').classList.add('hidden');
      showExplore();
    }

    async function searchUsers(query) {
      document.getElementById('searchLoading').classList.remove('hidden');
      document.getElementById('userResults').innerHTML = '';
      document.getElementById('noResults').classList.add('hidden');

      const { data: users, error } = await supabaseClient
        .from('profiles')
        .select('id, username, full_name, followers_count')
        .ilike('username', `%${query}%`)
        .neq('id', currentUser.id) // don't show yourself
        .limit(20);

      document.getElementById('searchLoading').classList.add('hidden');

      if (error || !users || users.length === 0) {
        document.getElementById('noResults').classList.remove('hidden');
        document.getElementById('noResultsQuery').textContent = `"${query}"`;
        return;
      }

      // Check which ones current user already follows
      const { data: following } = await supabaseClient
        .from('follows')
        .select('following_id')
        .eq('follower_id', currentUser.id);

      const followingIds = new Set((following || []).map(f => f.following_id));

      const list = document.getElementById('userResults');
      users.forEach(user => {
        const letter = (user.username || 'U')[0].toUpperCase();
        const isFollowing = followingIds.has(user.id);
        list.innerHTML += `
          <div class="user-result-item" id="user-${user.id}">
            <div class="user-result-left" onclick="window.location.href='user-profile.html?id=${user.id}'">
              <div class="user-avatar-med">${letter}</div>
              <div class="user-result-info">
                <span class="user-result-username">${user.username}</span>
                <span class="user-result-name">${user.full_name || ''}</span>
                <span class="user-result-followers">${user.followers_count || 0} followers</span>
              </div>
            </div>
            <button
              class="follow-btn ${isFollowing ? 'following' : ''}"
              id="follow-btn-${user.id}"
              onclick="toggleFollow('${user.id}', this)"
            >${isFollowing ? 'Following' : 'Follow'}</button>
          </div>
        `;
      });
    }

    // ── FOLLOW / UNFOLLOW ─────────────────────────────────────────
    async function toggleFollow(userId, btn) {
      const isFollowing = btn.classList.contains('following');

      // Optimistic UI
      btn.classList.toggle('following', !isFollowing);
      btn.textContent = isFollowing ? 'Follow' : 'Following';
      btn.disabled = true;

      if (isFollowing) {
        // Unfollow
        await supabaseClient.from('follows').delete()
          .eq('follower_id', currentUser.id)
          .eq('following_id', userId);

        // Decrement counts
        await supabaseClient.rpc('decrement_followers', { target_id: userId });
        await supabaseClient.rpc('decrement_following', { target_id: currentUser.id });
      } else {
        // Follow
        await supabaseClient.from('follows').insert({
          follower_id: currentUser.id,
          following_id: userId
        });

        // Increment counts
        await supabaseClient.rpc('increment_followers', { target_id: userId });
        await supabaseClient.rpc('increment_following', { target_id: currentUser.id });
      }

      btn.disabled = false;
    }
  </script>
</body>
</html>
