<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile — Instagram</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="app-body">

  <!-- TOP NAV -->
  <header class="top-nav">
    <h1 class="logo nav-logo" id="profileUsername">profile</h1>
    <div class="nav-icons">
      <button class="icon-btn" onclick="handleLogout()" title="Log out">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </header>

  <main class="main-content profile-main">

    <!-- Profile Header -->
    <section class="profile-header">
      <div class="profile-avatar-large" id="profileAvatarLarge">U</div>
      <div class="profile-stats">
        <div class="stat-item">
          <span class="stat-num" id="postCount">0</span>
          <span class="stat-label">posts</span>
        </div>
        <div class="stat-item">
          <span class="stat-num" id="followerCount">0</span>
          <span class="stat-label">followers</span>
        </div>
        <div class="stat-item">
          <span class="stat-num" id="followingCount">0</span>
          <span class="stat-label">following</span>
        </div>
      </div>
    </section>

    <!-- Bio -->
    <section class="profile-bio">
      <p class="bio-name" id="bioName">Your Name</p>
      <p class="bio-text" id="bioText">✨ This is your bio. Edit your profile to update it.</p>
      <button class="btn-outline" onclick="window.location.href='edit-profile.html'">Edit Profile</button>
    </section>

    <!-- Story highlights placeholder -->
    <section class="highlights-bar">
      <div class="highlight-item">
        <div class="highlight-circle add-highlight">+</div>
        <span>New</span>
      </div>
    </section>

    <hr class="divider-line" />

    <!-- Grid toggle -->
    <div class="grid-toggle">
      <button class="grid-btn active">
        <svg viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      </button>
      <button class="grid-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2"/><path d="M10 8l6 4-6 4V8z"/></svg>
      </button>
      <button class="grid-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>
      </button>
    </div>

    <!-- Posts Grid -->
    <div class="posts-grid" id="postsGrid">
      <!-- Posts load here -->
    </div>

    <!-- Empty state -->
    <div class="empty-profile hidden" id="emptyProfile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
      <h3>Share Photos</h3>
      <p>When you share photos, they'll appear on your profile.</p>
      <a href="upload.html" class="text-link">Share your first photo</a>
    </div>

  </main>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <a href="home.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    </a>
    <a href="search.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </a>
    <a href="upload.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    </a>
    <a href="reels.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2"/><path d="M10 8l6 4-6 4V8z"/></svg>
    </a>
    <a href="profile.html" class="nav-item active">
      <div class="nav-avatar" id="navAvatar">U</div>
    </a>
  </nav>

  <script src="auth.js"></script>
  <script>
    supabaseClient.auth.getSession().then(({ data: { session } }) => {
      if (!session) { window.location.href = 'index.html'; return; }
      loadProfile(session.user);
    });

    async function loadProfile(user) {
      const letter = (user.user_metadata?.username || user.email || 'U')[0].toUpperCase();
      document.getElementById('navAvatar').textContent = letter;
      document.getElementById('profileAvatarLarge').textContent = letter;
      document.getElementById('profileUsername').textContent = user.user_metadata?.username || user.email?.split('@')[0] || 'user';

      // Load profile from DB
      const { data: profile } = await supabaseClient
        .from('profiles')
        .select('*')
        .eq('id', user.id)
        .single();

      if (profile) {
        document.getElementById('bioName').textContent = profile.full_name || '';
        document.getElementById('bioText').textContent = profile.bio || '✨ Add a bio in Edit Profile';
        document.getElementById('followerCount').textContent = profile.followers_count || 0;
        document.getElementById('followingCount').textContent = profile.following_count || 0;
      }

      // Load posts
      const { data: posts } = await supabaseClient
        .from('posts')
        .select('id, image_url, likes_count')
        .eq('user_id', user.id)
        .order('created_at', { ascending: false });

      document.getElementById('postCount').textContent = posts?.length || 0;

      if (!posts || posts.length === 0) {
        document.getElementById('emptyProfile').classList.remove('hidden');
        return;
      }

      const grid = document.getElementById('postsGrid');
      posts.forEach(post => {
        grid.innerHTML += `
          <div class="grid-item">
            <img src="${post.image_url}" alt="post" loading="lazy"/>
            <div class="grid-overlay">
              <span>❤️ ${post.likes_count || 0}</span>
            </div>
          </div>
        `;
      });
    }
  </script>
</body>
</html>
