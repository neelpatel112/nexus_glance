<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile — Instagram</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="app-body">

  <!-- TOP NAV -->
  <header class="top-nav">
    <button class="icon-btn" onclick="history.back()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <h2 class="upload-title" id="topUsername">profile</h2>
    <div style="width:40px"></div>
  </header>

  <main class="main-content profile-main">

    <!-- Skeleton -->
    <div id="profileSkeleton" style="padding:20px 16px">
      <div style="display:flex;gap:24px;align-items:center;margin-bottom:16px">
        <div class="skeleton" style="width:77px;height:77px;border-radius:50%;flex-shrink:0"></div>
        <div style="flex:1;display:flex;gap:20px;justify-content:center">
          <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
            <div class="skeleton sk-line xshort"></div>
            <div class="skeleton sk-line xshort"></div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
            <div class="skeleton sk-line xshort"></div>
            <div class="skeleton sk-line xshort"></div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
            <div class="skeleton sk-line xshort"></div>
            <div class="skeleton sk-line xshort"></div>
          </div>
        </div>
      </div>
      <div class="skeleton sk-line short" style="margin-bottom:8px"></div>
      <div class="skeleton sk-line medium" style="margin-bottom:12px"></div>
      <div class="skeleton sk-line" style="height:32px;border-radius:8px"></div>
    </div>

    <!-- Profile content -->
    <div id="profileContent" class="hidden">

      <section class="profile-header">
        <div class="profile-avatar-large" id="profileAvatar">U</div>
        <div class="profile-stats">
          <div class="stat-item">
            <span class="stat-num" id="postCount">0</span>
            <span class="stat-label">posts</span>
          </div>
          <div class="stat-item">
            <span class="stat-num" id="followerCount">0</span>
            <span class="stat-label">followers</span>
          </div>
          <div class="stat-item">
            <span class="stat-num" id="followingCount">0</span>
            <span class="stat-label">following</span>
          </div>
        </div>
      </section>

      <section class="profile-bio">
        <p class="bio-name" id="bioName"></p>
        <p class="bio-text" id="bioText"></p>
        <div class="user-profile-actions">
          <button class="follow-btn-large" id="followBtn" onclick="toggleFollow()">Follow</button>
          <button class="btn-outline message-btn" onclick="">Message</button>
        </div>
      </section>

      <hr class="divider-line"/>

      <div class="grid-toggle">
        <button class="grid-btn active">
          <svg viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        </button>
      </div>

      <div class="posts-grid" id="postsGrid"></div>

      <div class="empty-profile hidden" id="emptyProfile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
        <h3>No Posts Yet</h3>
        <p>When they share photos, they'll appear here.</p>
      </div>

    </div>

  </main>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <a href="home.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    </a>
    <a href="search.html" class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </a>
    <a href="upload.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    </a>
    <a href="reels.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2"/><path d="M10 8l6 4-6 4V8z"/></svg>
    </a>
    <a href="profile.html" class="nav-item">
      <div class="nav-avatar" id="navAvatar">U</div>
    </a>
  </nav>

  <script src="auth.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const profileId = params.get('id');
    let currentUser = null;
    let isFollowing = false;

    if (!profileId) window.location.href = 'search.html';

    supabaseClient.auth.getSession().then(({ data: { session } }) => {
      if (!session) { window.location.href = 'index.html'; return; }
      currentUser = session.user;

      // If viewing own profile, redirect to profile.html
      if (currentUser.id === profileId) {
        window.location.href = 'profile.html'; return;
      }

      const letter = (currentUser.user_metadata?.username || currentUser.email || 'U')[0].toUpperCase();
      document.getElementById('navAvatar').textContent = letter;
      loadProfile();
    });

    async function loadProfile() {
      const [profileRes, postsRes, followRes] = await Promise.all([
        supabaseClient.from('profiles').select('*').eq('id', profileId).single(),
        supabaseClient.from('posts').select('id, image_url, likes_count').eq('user_id', profileId).order('created_at', { ascending: false }),
        supabaseClient.from('follows').select('id').eq('follower_id', currentUser.id).eq('following_id', profileId).single()
      ]);

      document.getElementById('profileSkeleton').remove();

      const profile = profileRes.data;
      const posts = postsRes.data || [];
      isFollowing = !!followRes.data;

      if (!profile) {
        document.getElementById('profileContent').innerHTML = '<p style="padding:32px;text-align:center;color:#8e8e8e">User not found.</p>';
        document.getElementById('profileContent').classList.remove('hidden');
        return;
      }

      // Populate
      const letter = (profile.username || 'U')[0].toUpperCase();
      document.getElementById('profileAvatar').textContent = letter;
      document.getElementById('topUsername').textContent = profile.username;
      document.getElementById('bioName').textContent = profile.full_name || '';
      document.getElementById('bioText').textContent = profile.bio || '';
      document.getElementById('postCount').textContent = posts.length;
      document.getElementById('followerCount').textContent = profile.followers_count || 0;
      document.getElementById('followingCount').textContent = profile.following_count || 0;

      // Follow button state
      updateFollowBtn();

      // Posts grid
      if (posts.length === 0) {
        document.getElementById('emptyProfile').classList.remove('hidden');
      } else {
        const grid = document.getElementById('postsGrid');
        posts.forEach(post => {
          grid.innerHTML += `
            <div class="grid-item" onclick="window.location.href='post.html?id=${post.id}'">
              <img src="${post.image_url}" alt="post" loading="lazy"/>
              <div class="grid-overlay"><span>❤️ ${post.likes_count || 0}</span></div>
            </div>
          `;
        });
      }

      document.getElementById('profileContent').classList.remove('hidden');
    }

    function updateFollowBtn() {
      const btn = document.getElementById('followBtn');
      if (isFollowing) {
        btn.textContent = 'Following';
        btn.classList.add('following');
      } else {
        btn.textContent = 'Follow';
        btn.classList.remove('following');
      }
    }

    async function toggleFollow() {
      const btn = document.getElementById('followBtn');
      btn.disabled = true;
      isFollowing = !isFollowing;
      updateFollowBtn();

      // Update follower count on screen
      const followerEl = document.getElementById('followerCount');
      let count = parseInt(followerEl.textContent) || 0;
      followerEl.textContent = isFollowing ? count + 1 : Math.max(0, count - 1);

      if (isFollowing) {
        await supabaseClient.from('follows').insert({
          follower_id: currentUser.id,
          following_id: profileId
        });
        await supabaseClient.rpc('increment_followers', { target_id: profileId });
        await supabaseClient.rpc('increment_following', { target_id: currentUser.id });
      } else {
        await supabaseClient.from('follows').delete()
          .eq('follower_id', currentUser.id)
          .eq('following_id', profileId);
        await supabaseClient.rpc('decrement_followers', { target_id: profileId });
        await supabaseClient.rpc('decrement_following', { target_id: currentUser.id });
      }

      btn.disabled = false;
    }
  </script>
</body>
</html>
