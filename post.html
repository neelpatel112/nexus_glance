<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Post — Instagram</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="app-body">

  <!-- TOP NAV -->
  <header class="top-nav">
    <button class="icon-btn" onclick="history.back()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <h2 class="upload-title">Post</h2>
    <div style="width:40px"></div>
  </header>

  <main class="main-content post-detail-main" id="postMain">

    <!-- Skeleton -->
    <div id="postSkeleton">
      <div class="post-card skeleton-card">
        <div class="post-header">
          <div class="skeleton sk-avatar"></div>
          <div class="skeleton-lines">
            <div class="skeleton sk-line short"></div>
            <div class="skeleton sk-line xshort"></div>
          </div>
        </div>
        <div class="skeleton sk-image"></div>
        <div class="post-actions-wrap">
          <div class="skeleton sk-line medium" style="margin:12px 16px"></div>
        </div>
      </div>
    </div>

    <!-- Post content loads here -->
    <div id="postContent" class="hidden"></div>

    <!-- Comments section -->
    <div id="commentsSection" class="comments-section hidden">
      <div class="comments-header">Comments</div>
      <div id="commentsList"></div>
      <div class="empty-comments hidden" id="emptyComments">
        <p>No comments yet.</p>
        <span>Be the first to comment.</span>
      </div>
    </div>

  </main>

  <!-- Comment input bar -->
  <div class="comment-bar" id="commentBar" style="display:none">
    <div class="comment-avatar" id="commentAvatar">U</div>
    <input
      type="text"
      id="commentInput"
      class="comment-input"
      placeholder="Add a comment…"
      maxlength="300"
      onkeydown="if(event.key==='Enter') submitComment()"
    />
    <button class="comment-post-btn" id="commentPostBtn" onclick="submitComment()" disabled>Post</button>
  </div>

  <script src="auth.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const postId = params.get('id');
    let currentUser = null;
    let isLiked = false;
    let likeCount = 0;

    if (!postId) window.location.href = 'home.html';

    supabaseClient.auth.getSession().then(({ data: { session } }) => {
      if (!session) { window.location.href = 'index.html'; return; }
      currentUser = session.user;
      const letter = (currentUser.user_metadata?.username || currentUser.email || 'U')[0].toUpperCase();
      document.getElementById('commentAvatar').textContent = letter;
      document.getElementById('commentBar').style.display = 'flex';
      loadPost();
    });

    // Enable/disable post button
    document.getElementById('commentInput')?.addEventListener('input', function() {
      document.getElementById('commentPostBtn').disabled = !this.value.trim();
    });

    async function loadPost() {
      const { data: post, error } = await supabaseClient
        .from('posts')
        .select('*, profiles(username, avatar_url)')
        .eq('id', postId)
        .single();

      document.getElementById('postSkeleton').remove();

      if (error || !post) {
        document.getElementById('postContent').innerHTML = '<p style="padding:32px;text-align:center;color:#8e8e8e">Post not found.</p>';
        document.getElementById('postContent').classList.remove('hidden');
        return;
      }

      // Check if current user liked this post
      const { data: likeData } = await supabaseClient
        .from('likes')
        .select('id')
        .eq('post_id', postId)
        .eq('user_id', currentUser.id)
        .single();

      isLiked = !!likeData;
      likeCount = post.likes_count || 0;

      renderPost(post);
      loadComments();
    }

    function renderPost(post) {
      const username = post.profiles?.username || 'user';
      const letter = username[0].toUpperCase();
      const timeAgo = getTimeAgo(post.created_at);
      const tags = post.tags ? post.tags.split(',').map(t => `<a class="tag-link">#${t}</a>`).join(' ') : '';

      document.getElementById('postContent').innerHTML = `
        <article class="post-card">
          <div class="post-header">
            <div class="post-avatar">${letter}</div>
            <div class="post-meta">
              <span class="post-username">${username}</span>
              <span class="post-location">${post.location || ''}</span>
            </div>
            <button class="icon-btn more-btn">•••</button>
          </div>

          <div class="post-img-wrap" ondblclick="toggleLike()">
            <img class="post-image" src="${post.image_url}" alt="post" id="postImg"/>
            <div class="heart-burst-wrap" id="heartBurst"></div>
          </div>

          <div class="post-actions-wrap">
            <div class="post-actions">
              <button class="action-btn like-btn" id="likeBtn" onclick="toggleLike()">
                ${heartIcon(isLiked)}
              </button>
              <button class="action-btn" onclick="document.getElementById('commentInput').focus()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              </button>
              <button class="action-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              </button>
            </div>
            <button class="action-btn bookmark-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
            </button>
          </div>

          <div class="post-likes" id="likesCount">
            <strong>${likeCount} ${likeCount === 1 ? 'like' : 'likes'}</strong>
          </div>

          ${post.caption ? `<div class="post-caption"><strong>${username}</strong> ${post.caption}</div>` : ''}
          ${tags ? `<div class="post-tags">${tags}</div>` : ''}
          <div class="post-time">${timeAgo}</div>
        </article>
      `;

      document.getElementById('postContent').classList.remove('hidden');
      document.getElementById('commentsSection').classList.remove('hidden');
    }

    function heartIcon(liked) {
      return liked
        ? `<svg viewBox="0 0 24 24" fill="#ef4444" stroke="#ef4444" stroke-width="1.8"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`
        : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
    }

    async function toggleLike() {
      if (!currentUser) return;

      // Optimistic UI
      isLiked = !isLiked;
      likeCount += isLiked ? 1 : -1;
      if (likeCount < 0) likeCount = 0;

      document.getElementById('likeBtn').innerHTML = heartIcon(isLiked);
      document.getElementById('likesCount').innerHTML = `<strong>${likeCount} ${likeCount === 1 ? 'like' : 'likes'}</strong>`;

      // Heart burst on like
      if (isLiked) showHeartBurst();

      // DB update
      if (isLiked) {
        await supabaseClient.from('likes').insert({ post_id: postId, user_id: currentUser.id });
        await supabaseClient.from('posts').update({ likes_count: likeCount }).eq('id', postId);
      } else {
        await supabaseClient.from('likes').delete().eq('post_id', postId).eq('user_id', currentUser.id);
        await supabaseClient.from('posts').update({ likes_count: likeCount }).eq('id', postId);
      }
    }

    function showHeartBurst() {
      const wrap = document.getElementById('heartBurst');
      wrap.innerHTML = '<span class="heart-burst">❤️</span>';
      setTimeout(() => { wrap.innerHTML = ''; }, 900);
    }

    async function loadComments() {
      const { data: comments } = await supabaseClient
        .from('comments')
        .select('*, profiles(username)')
        .eq('post_id', postId)
        .order('created_at', { ascending: true });

      const list = document.getElementById('commentsList');
      list.innerHTML = '';

      if (!comments || comments.length === 0) {
        document.getElementById('emptyComments').classList.remove('hidden');
        return;
      }

      document.getElementById('emptyComments').classList.add('hidden');
      comments.forEach(c => {
        list.innerHTML += buildComment(c);
      });
    }

    function buildComment(c) {
      const username = c.profiles?.username || 'user';
      const letter = username[0].toUpperCase();
      const isOwn = c.user_id === currentUser?.id;
      return `
        <div class="comment-item" id="comment-${c.id}">
          <div class="comment-avatar-small">${letter}</div>
          <div class="comment-body">
            <p><strong>${username}</strong> ${c.content}</p>
            <div class="comment-meta">
              <span>${getTimeAgo(c.created_at)}</span>
              ${isOwn ? `<button class="comment-delete-btn" onclick="deleteComment('${c.id}')">Delete</button>` : ''}
            </div>
          </div>
          <button class="comment-like-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          </button>
        </div>
      `;
    }

    async function submitComment() {
      const input = document.getElementById('commentInput');
      const content = input.value.trim();
      if (!content || !currentUser) return;

      const btn = document.getElementById('commentPostBtn');
      btn.disabled = true;
      input.value = '';

      const { data, error } = await supabaseClient
        .from('comments')
        .insert({ post_id: postId, user_id: currentUser.id, content })
        .select('*, profiles(username)')
        .single();

      if (!error && data) {
        document.getElementById('emptyComments').classList.add('hidden');
        document.getElementById('commentsList').innerHTML += buildComment(data);
        // Scroll to bottom of comments
        document.getElementById('commentsList').lastElementChild?.scrollIntoView({ behavior: 'smooth' });
      }
      btn.disabled = false;
    }

    async function deleteComment(commentId) {
      await supabaseClient.from('comments').delete().eq('id', commentId);
      document.getElementById('comment-' + commentId)?.remove();
      const list = document.getElementById('commentsList');
      if (!list.children.length) {
        document.getElementById('emptyComments').classList.remove('hidden');
      }
    }

    function getTimeAgo(dateStr) {
      const diff = Date.now() - new Date(dateStr);
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return `${mins}m`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs}h`;
      return `${Math.floor(hrs / 24)}d`;
    }
  </script>
</body>
</html>
